# Hologram Display Configuration

# Network
udp_port=4210

# Hall Effect Sensor
hall_gpio_pin=3
hall_bias=none
hall_edge=falling

# LED Matrix
led_rows=64
led_cols=128
led_parallel=2
led_chain_length=1
led_brightness=50
led_hardware_mapping=regular
led_gpio_slowdown=2

# Display
slice_count=120

