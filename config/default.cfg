# Hologram Display Configuration

# Network
udp_port=4210

# Hall Effect Sensor
# GPIO pin connected to the hall sensor signal output.
# Recommended: use a free GPIO on the 40-pin header that is NOT routed through
# the HUB75 bonnet (e.g. GPIO 19, 20, 26 on Port 3 of a Pi Zero 2 W),
# and add an external 4.7k-10k pull-up to 3.3V for robustness.
hall_gpio_pin=26
# Bias applied to the GPIO input line (pull_up | pull_down | none).
# pull_up is required for open-collector sensors like the A3144.
hall_bias=pull_up
# Edge to detect as a rotation event (falling | rising | both).
# A3144 open-collector modules pull the line LOW when triggered, so use falling.
hall_edge=falling

# LED Matrix
led_rows=32
led_cols=64
led_parallel=1
led_chain_length=1
led_brightness=50
led_hardware_mapping=regular
led_gpio_slowdown=2

# Display
slice_count=120
